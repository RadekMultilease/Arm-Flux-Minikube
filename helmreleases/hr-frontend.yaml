apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: frontend
  namespace: default
spec:
  interval: 5m0s
  chart:
    spec:
      chart: "main-helm"
      sourceRef:
        kind: GitRepository
        name: multi-crm-charts
        namespace: flux-system
  targetNamespace: default
  values:
    apps:
      frontend:
        image:
          tag: "arm64"